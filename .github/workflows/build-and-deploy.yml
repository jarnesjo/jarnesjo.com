name: "Build and Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/jarnesjo/jarnesjo.com:latest
          build-args: |
            NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${{ secrets.APP_NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GITHUB_TOKEN
          script: |
            echo $GITHUB_TOKEN | docker login ghcr.io -u jarnesjo --password-stdin
            docker pull ghcr.io/jarnesjo/jarnesjo.com:latest
            docker stop jarnesjo.com
            docker system prune -f
            docker run --name jarnesjo.com -dit -p 3000:3000 ghcr.io/jarnesjo/jarnesjo.com:latest
